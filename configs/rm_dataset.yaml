# RM 装甲板 Pose 估计数据集配置
# 类别 ID 与原始标签保持完全一致（0-13，共 14 类）

path: /home/.../rm_yolo/data/dataset_aug
train: train/images
val:   val/images

# 4 个装甲板角点关键点，无 visibility 维度
kpt_shape: [4, 2]
# 水平翻转时关键点重映射: 左上(0)↔右上(1)，右下(2)↔左下(3)
flip_idx: [1, 0, 3, 2]

nc: 14
names:
  0:  B1   # 蓝方一号
  1:  B2   # 蓝方二号
  2:  B3   # 蓝方三号
  3:  B4   # 蓝方四号
  4:  B5   # 蓝方五号
  5:  BO   # 蓝方前哨站
  6:  BS   # 蓝方哨兵
  7:  R1   # 红方一号
  8:  R2   # 红方二号
  9:  R3   # 红方三号
  10: R4   # 红方四号
  11: R5   # 红方五号
  12: RO   # 红方前哨站
  13: RS   # 红方哨兵
